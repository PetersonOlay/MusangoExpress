apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: runner-deployer-role
  namespace: musangoexpress
rules:
- apiGroups: ["", "apps", "extensions"]
  resources: ["*"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["networking.k8s.io"] # Added this block
  resources: ["ingresses"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: runner-deployer-binding
  namespace: musangoexpress
subjects:
- kind: ServiceAccount
  name: arc-runner-set-gha-rs-no-permission
  namespace: arc-runners
roleRef:
  kind: Role
  name: runner-deployer-role
  apiGroup: rbac.authorization.k8s.io
