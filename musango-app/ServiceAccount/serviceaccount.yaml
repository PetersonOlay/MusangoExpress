---
# 1. ServiceAccount for the runner pods
apiVersion: v1
kind: ServiceAccount
metadata:
  name: runner-service-account
  namespace: arc-runners

---
# 2. Role with permissions to manage Deployments
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: deployment-manager-role
  namespace: musangoexpress
rules:
- apiGroups: ["apps"]
  resources: ["deployments", "deployments/status", "replicasets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "secrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
# 3. RoleBinding to assign the Role to the ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: runner-deployment-binding
  namespace: musangoexpress
subjects:
- kind: ServiceAccount
  name: runner-service-account
  namespace: arc-runners
roleRef:
  kind: Role
  name: deployment-manager-role
  apiGroup: rbac.authorization.k8s.io