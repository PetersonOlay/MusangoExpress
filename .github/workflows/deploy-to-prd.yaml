name: Deploy to Production
on:
  pull_request:
    types:
      - closed
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up node
        uses: actions/setup-node@v2
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm install
        working-directory: musango-app


  containerized-deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event.pull_request.merged == true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name : Setup Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}  

      - name: Build and push Docker image
        uses: docker/build-push-action@v2
        with:
          context: ./musango-app
          file: ./musango-app/Dockerfile
          push: true
          tags: previsetech/musangoexpress:1.0.0

  deploy-to-kubernetes:
    runs-on: arc-runner-set
    needs: containerized-deploy
    if: github.event.pull_request.merged == true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Kubernetes
        uses: azure/setup-kubectl@v2
        with:
          version: 'latest'


      # Because the runner is inside the cluster, kubectl is 
      # automatically authenticated via the attached ServiceAccount.
      - name: Deploy to Kubernetes
        run: |
          echo "Deploying to Kubernetes using self-managed runner..."
          kubectl version --client
          # The cluster context is set by default for internal pods
          kubectl apply -f musango-app/kubernetes/deployment/namespace.yaml
          kubectl apply -f musango-app/kubernetes/deployment/musango.yaml
          kubectl apply -f musango-app/kubernetes/deployment/mongo.yaml